<!DOCTYPE html>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
          <div id="email-error" class="error-message">Please enter a valid email address.</div>
        </div>

        <div class="form-group">
          <label for="username">Rec Room Username (start with @)</label>
          <input type="text" id="username" name="username" placeholder="@YourUsername" required />
          <div id="username-error" class="error-message">Username must start with @.</div>
        </div>

        <div class="form-group">
          <label for="issue">Request Type</label>
          <select id="issue" name="issue" required>
            <option value="" disabled selected>Please choose a request type</option>
            <option value="Technical Support">Technical Support</option>
            <option value="General Inquiry">General Inquiry</option>
            <option value="Bug Report">Bug Report</option>
            <option value="Feedback / Feature Request">Feedback / Feature Request</option>
            <option value="Room Ban Appeal">Room Ban Appeal</option>
          </select>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="Briefly summarize your request" required />
        </div>

        <div class="form-group">
          <label for="priority">Priority Level</label>
          <select id="priority" name="priority" required>
            <option value="" disabled selected>Select priority level</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Urgent">Urgent</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Please describe your issue or question..." required></textarea>
        </div>

        <div class="form-group">
          <label for="files">Attach Files (optional)</label>
          <input type="file" id="files" name="files" multiple />
          <div id="file-list"></div>
        </div>

        <button type="submit" id="submit-btn">Submit</button>
      </form>

      <footer class="support-footer">
        <div style="text-align:center; margin-top:20px; font-size:0.8rem; color:#888;">v2026-4-3</div>
      </footer>
    </div>

    <div id="shutdown-screen" class="shutdown-screen">
      <h1>Support Has Closed</h1>
      <p>
        As part of the Rec Room shutdown, the RecTuberMultiShow support page became unavailable on June 1, 2026.<br><br>
        Thank you for being part of the journey.
      </p>
    </div>
  </div>
</body>
</html>
